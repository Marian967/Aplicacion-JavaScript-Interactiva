<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Proyecto Final JS</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>

        <header>
            <h1>Mi Aplicación Web</h1>
            <nav>
                <a href="#calculadora">Calculadora</a>
                <a href="#tareas">Tareas</a>
                <a href="#galeria">Galería</a>
            </nav>
        </header>

        
        <main>
            <!-- CALCULADORA -->
            <section id="calculadora">
                <h2>Calculadora</h2>
                <div class="calc">
                    <input type="text" id="pantalla" disabled>

                    <div class="botones">
                        <button onclick="calc.agregarNumero(7)">7</button>
                        <button onclick="calc.agregarNumero(8)">8</button>
                        <button onclick="calc.agregarNumero(9)">9</button>
                        <button onclick="calc.operacion('/')">÷</button>

                        <button onclick="calc.agregarNumero(4)">4</button>
                        <button onclick="calc.agregarNumero(5)">5</button>
                        <button onclick="calc.agregarNumero(6)">6</button>
                        <button onclick="calc.operacion('*')">×</button>

                        <button onclick="calc.agregarNumero(1)">1</button>
                        <button onclick="calc.agregarNumero(2)">2</button>
                        <button onclick="calc.agregarNumero(3)">3</button>
                        <button onclick="calc.operacion('-')">-</button>

                        <button onclick="calc.agregarNumero(0)">0</button>
                        <button onclick="calc.calcular()">=</button>
                        <button onclick="calc.limpiar()">C</button>
                        <button onclick="calc.operacion('+')">+</button>
                    </div>
                </div>
            </section>
        
            <!-- TAREAS -->
            <section id="tareas">
                <h2>Lista de Tareas</h2>

                <div class="todo">
                    <div class="input-tarea">
                        <input type="text" id="nuevaTarea" placeholder="Escribe una tarea...">
                        <button onclick="lista.agregarTarea()">Agregar</button>
                    </div>

                    <p id="contadorTareas"></p>

                    <ul id="listaTareas"></ul>
                </div>
            </section>

            <!-- GALERIA -->
            <section id="galeria">
                <h2>Galería</h2>

                <img id="imagenPrincipal" src="https://picsum.photos/600/400" class="principal">

                <div class="miniaturas">
                    <img src="https://picsum.photos/600/400?1" onclick="galeria.cambiarImagen(this)">
                    <img src="https://picsum.photos/600/400?2" onclick="galeria.cambiarImagen(this)">
                    <img src="https://picsum.photos/600/400?3" onclick="galeria.cambiarImagen(this)">
                </div>
            </section>
        </main>

        <footer>
            <p>Trabajo Final - Módulo 2 - JavaScript</p>
        </footer>

        <script src="app.js"></script>

    </body>
</html>
